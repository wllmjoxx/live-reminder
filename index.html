<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#18181b"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Live Reminder</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #18181b; color: #e4e4e7;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .sticky-top {
      flex-shrink: 0;
      background: #18181b;
      z-index: 100;
    }
    #main-content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    #schedule-list { padding: 0 12px 24px; }

    /* ── HEADER ── */
    header {
      background: #1c1c1f;
      padding: 12px 16px 8px; text-align: center;
      border-bottom: 1px solid #2d2d30;
    }
    header h1   { font-size: 0.88rem; font-weight: 600; color: #a1a1aa; margin-bottom: 2px; }
    #clock      { font-size: 1.8rem; font-weight: 700; color: #f4f4f5; letter-spacing: 2px; }
    #date-display { font-size: 0.7rem; color: #71717a; margin-top: 1px; }
    #notif-count  { font-size: 0.66rem; color: #52525b; margin-top: 1px; }

    /* ── STATS ── */
    .stats { display: flex; gap: 6px; padding: 6px 12px 4px; }
    .stat-card { flex: 1; background: #27272a; border-radius: 8px; padding: 6px; text-align: center; border: 1px solid #3f3f46; }
    .stat-num   { font-size: 1.2rem; font-weight: 700; }
    .stat-label { font-size: 0.58rem; color: #71717a; margin-top: 1px; }
    .stat-card.total    .stat-num { color: #818cf8; }   /* indigo */
    .stat-card.marathon .stat-num { color: #fb923c; }   /* orange muted */
    .stat-card.single   .stat-num { color: #34d399; }   /* emerald */

    /* ── BANNER ── */
    .banner { display: none; padding: 5px 16px; font-size: 0.78rem; text-align: center; }
    .banner.success { background: #14532d; color: #86efac; }
    .banner.error   { background: #450a0a; color: #fca5a5; }
    .banner.warning { background: #431407; color: #fdba74; }

    /* ── TABS ── */
    .tabs { display: flex; background: #27272a; padding: 5px; gap: 4px; margin: 5px 12px 3px; border-radius: 10px; border: 1px solid #3f3f46; }
    .tab-btn { flex: 1; padding: 7px 4px; border: none; border-radius: 7px; font-size: 0.74rem; font-weight: 600; cursor: pointer; background: transparent; color: #71717a; transition: all 0.2s; }
    .tab-btn.active            { background: #18181b; color: #f4f4f5; }
    .tab-btn.active.t-marathon { color: #fb923c; }
    .tab-btn.active.t-timeline { color: #818cf8; }
    .tab-btn.active.t-single   { color: #34d399; }
    .tab-btn.active.t-standby  { color: #c084fc; }
    .tab-btn.active.t-klasemen { color: #67e8f9; }

    /* ── REFRESH / ACTIONS ── */
    .actions { padding: 3px 12px 6px; display: flex; gap: 6px; }
    .btn-refresh { flex: 1; padding: 7px; border: none; border-radius: 8px; background: #27272a; color: #a1a1aa; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px solid #3f3f46; }
    .btn-refresh:active { background: #3f3f46; }
    .btn-notif   { flex: 1; padding: 7px; border: none; border-radius: 8px; background: #27272a; color: #818cf8; font-size: 0.78rem; font-weight: 600; cursor: pointer; border: 1px solid #3f3f46; }
    .btn-notif:active { background: #3f3f46; }

    /* ── LOADING ── */
    #loading { display: none; justify-content: center; align-items: center; padding: 30px; gap: 10px; }
    .spinner { width: 24px; height: 24px; border: 3px solid #27272a; border-top-color: #818cf8; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── ACCORDION TIME BLOCK ── */
    .time-block { margin-bottom: 6px; }
    .time-header {
      font-size: 0.82rem; font-weight: 700;
      padding: 8px 10px;
      display: flex; align-items: center; gap: 6px;
      border-radius: 8px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .time-header:active { opacity: 0.8; }
    .start-header { background: #14532d26; color: #4ade80; border: 1px solid #14532d; }
    .end-header   { background: #450a0a26; color: #f87171; border: 1px solid #450a0a; }
    .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .start-dot { background: #4ade80; }
    .end-dot   { background: #f87171; }
    .toggle-icon { font-size: 0.7rem; margin-right: 2px; transition: transform 0.2s; }
    .count-badge {
      margin-left: auto;
      font-size: 0.65rem; font-weight: 700;
      background: rgba(255,255,255,0.07);
      padding: 1px 7px; border-radius: 999px;
    }
    .sessions-container {
      overflow: hidden;
      transition: max-height 0.25s ease;
    }
    .time-block.collapsed .sessions-container { max-height: 0 !important; }
    .time-block.collapsed .toggle-icon { transform: rotate(-90deg); }

    /* ── SESSION CARD ── */
    .session-card {
      background: #27272a; border-radius: 10px;
      padding: 9px 10px; margin: 4px 0;
      display: flex; align-items: center; gap: 8px;
      border-left: 4px solid #818cf8;
      border: 1px solid #3f3f46;
      border-left: 4px solid #818cf8;
    }
    .session-card.soon         { border-left-color: #fb923c; background: #1c1a17; }
    .session-card.past         { opacity: 0.35; }
    .session-card.marathon-card { border-left-color: #fb923c; }

    .session-num {
      min-width: 20px; height: 20px; background: #3f3f46;
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 0.62rem; font-weight: 700;
      flex-shrink: 0; color: #a1a1aa;
    }
    .session-info { flex: 1; min-width: 0; }
    .session-brand {
      font-weight: 700; font-size: 0.88rem; margin-bottom: 3px;
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .type-badge { font-size: 0.58rem; padding: 1px 5px; border-radius: 999px; font-weight: 700; }
    .marathon-badge { background: #431407; color: #fdba74; }
    .single-badge   { background: #14532d; color: #86efac; }

    .session-meta  { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 3px; }
    .badge { font-size: 0.62rem; padding: 2px 6px; border-radius: 999px; font-weight: 600; }
    .badge.marketplace { background: #1e1b4b; color: #a5b4fc; }
    .badge.studio      { background: #14532d; color: #86efac; }
    .badge.idline      { background: #2d2d30; color: #d4d4d8; }

    .session-host { font-size: 0.7rem; color: #71717a; }
    .session-time-small { font-size: 0.65rem; color: #52525b; margin-top: 2px; }

    /* ── PIC RIGHT ── */
    .session-pic-right {
      flex-shrink: 0;
      text-align: right;
      font-size: 0.82rem;
      font-weight: 700;
      color: #818cf8;
      max-width: 90px;
      word-break: break-word;
      line-height: 1.3;
    }
    .session-pic-right.lsc { color: #fb923c; font-size: 0.78rem; }

    /* ── MARATHON SESSION CARD ── */
    .marathon-session-card {
      background: #1c1c1f;
      border: 1px solid #3f3f46;
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .ms-header { background: #27272a; padding: 8px 12px; border-bottom: 1px solid #3f3f46; }
    .ms-brand  { font-size: 0.92rem; font-weight: 800; color: #f4f4f5; margin-bottom: 4px; }
    .ms-meta   { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 3px; }
    .ms-time   { font-size: 0.67rem; color: #71717a; }
    .ms-hosts  { padding: 5px 8px; }

    .ms-ended {
      border-color: #2d2d30 !important;
      background: #18181b !important;
    }
    .ms-ended .ms-brand { color: #52525b; }
    .ms-ended .ms-time  { color: #3f3f46; }
    .ms-ended .badge    { opacity: 0.4; }

    /* ── HOST ROWS ── */
    .host-row { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: 7px; margin-bottom: 3px; border-left: 3px solid transparent; }
    .host-current { background: #14532d1a; border-left-color: #22c55e; }
    .host-next    { background: #1e1b4b1a; border-left-color: #818cf8; }
    .host-past    { opacity: 0.3; }

    .hr-num   { min-width: 18px; height: 18px; background: #3f3f46; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; font-weight: 700; flex-shrink: 0; color: #a1a1aa; }
    .hr-time  { display: flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .hr-start { font-size: 0.7rem; font-weight: 700; color: #4ade80; }
    .hr-arrow { font-size: 0.6rem; color: #52525b; }
    .hr-end   { font-size: 0.7rem; color: #f87171; }
    .hr-info  { flex: 1; min-width: 0; }
    .hr-name  { font-size: 0.78rem; color: #e4e4e7; }
    .hr-pic   { font-size: 0.64rem; color: #52525b; }

    .live-badge { display: inline-block; background: #15803d; color: #fff; font-size: 0.55rem; padding: 1px 5px; border-radius: 999px; font-weight: 700; margin-left: 4px; animation: pulse 1.5s infinite; }
    .next-badge { display: inline-block; background: #3730a3; color: #c7d2fe; font-size: 0.55rem; padding: 1px 5px; border-radius: 999px; font-weight: 700; margin-left: 4px; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ── NOTIF PANEL ── */
    #notif-panel {
      display: none;
      padding: 6px 12px;
      background: #1c1c1f;
      border-top: 1px solid #2d2d30;
    }
    .notif-time-btn {
      padding: 5px 10px; border: none; border-radius: 7px;
      background: #27272a; color: #818cf8;
      font-size: 0.72rem; font-weight: 600; cursor: pointer;
      border: 1px solid #3f3f46;
    }
    .notif-time-btn:active { background: #3f3f46; }

    /* ── STANDBY TAB ── */
    .standby-wrapper { padding: 8px 12px 24px; }
    .standby-section { background: #27272a; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid #3f3f46; }
    .standby-title   { font-size: 0.9rem; font-weight: 800; color: #c084fc; margin-bottom: 4px; text-align: center; }
    .standby-label   { font-size: 0.72rem; font-weight: 700; color: #71717a; margin-bottom: 6px; letter-spacing: 1px; }
    .pic-row         { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; border-bottom: 1px solid #3f3f46; }
    .pic-row:last-child { border-bottom: none; }
    .pic-name        { font-size: 0.8rem; font-weight: 700; color: #e4e4e7; }
    .pic-studios     { font-size: 0.72rem; color: #818cf8; }
    .standby-brand-card { background: #27272a; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; border: 1px solid #3f3f46; }
    .standby-brand-title { font-size: 0.82rem; font-weight: 700; color: #e4e4e7; margin-bottom: 6px; }
    .standby-row     { display: flex; align-items: center; gap: 10px; padding: 4px 0; }
    .standby-time    { font-size: 0.72rem; color: #71717a; min-width: 60px; }
    .standby-pic     { font-size: 0.82rem; font-weight: 700; color: #818cf8; }
    .standby-text    { font-size: 0.75rem; color: #71717a; line-height: 1.6; white-space: pre-line; }
    .standby-link    { display: block; color: #818cf8; font-size: 0.75rem; padding: 4px 0; text-decoration: none; }
    .standby-link:active { opacity: 0.7; }
    .standby-copy    { width: 100%; padding: 10px; border: none; border-radius: 10px; background: #27272a; color: #c084fc; font-size: 0.82rem; font-weight: 700; cursor: pointer; margin-top: 4px; border: 1px solid #3f3f46; }

    .empty { text-align: center; padding: 40px 20px; color: #3f3f46; font-size: 0.88rem; }
  </style>
</head>
<body>

<!-- ── STICKY TOP ── -->
<div class="sticky-top">
  <header>
    <h1>🎬 Live Schedule Reminder</h1>
    <div id="clock">--:--:--</div>
    <div id="date-display">Memuat...</div>
    <div id="notif-count">🔔 ...</div>
  </header>

  <div id="banner" class="banner"></div>

  <div class="stats">
    <div class="stat-card total">
      <div class="stat-num" id="stat-total">-</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat-card marathon">
      <div class="stat-num" id="stat-marathon">-</div>
      <div class="stat-label">Marathon Session</div>
    </div>
    <div class="stat-card single">
      <div class="stat-num" id="stat-single">-</div>
      <div class="stat-label">Single Session</div>
    </div>
  </div>

  <div class="tabs">
    <button id="tab-marathon" class="tab-btn t-marathon active" onclick="switchTab('marathon')">Marathon Host</button>
    <button id="tab-timeline" class="tab-btn t-timeline"        onclick="switchTab('timeline')">Start/End Live</button>
    <button id="tab-single"   class="tab-btn t-single"          onclick="switchTab('single')">Single Host</button>
    <button id="tab-standby"  class="tab-btn t-standby"         onclick="switchTab('standby')">📌 Standby</button>
    <button id="tab-klasemen" class="tab-btn t-klasemen"        onclick="switchTab('klasemen')">Klasemen</button>
  </div>

  <div class="actions">
    <button class="btn-refresh" onclick="loadSchedule()">🔄 Refresh</button>
    <button class="btn-notif"   onclick="showNotifPanel()">🔔 Notif</button>
  </div>

  <!-- Notif Panel -->
  <div id="notif-panel">
    <div style="font-size:0.72rem; color:#71717a; margin-bottom:6px;">Kirim notif untuk jam:</div>
    <div id="notif-time-list" style="display:flex; flex-wrap:wrap; gap:5px;"></div>
    <div style="display:flex; gap:6px; margin-top:8px;">
      <button onclick="sendManualNotifAll()" style="flex:1;padding:6px;border:none;border-radius:7px;background:#27272a;color:#818cf8;font-size:0.75rem;font-weight:600;cursor:pointer;border:1px solid #3f3f46;">📢 Kirim Semua Upcoming</button>
      <button onclick="closeNotifPanel()" style="padding:6px 10px;border:none;border-radius:7px;background:#27272a;color:#71717a;font-size:0.75rem;cursor:pointer;border:1px solid #3f3f46;">✕</button>
    </div>
  </div>
</div>

<!-- ── SCROLLABLE ── -->
<div id="main-content">
  <div id="loading">
    <div class="spinner"></div>
    <span style="color:#71717a;font-size:0.78rem">Memuat...</span>
  </div>
  <div id="schedule-list"></div>
</div>

<script src="app.js"></script>
</body>
</html>
